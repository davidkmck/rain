<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Atmosphere - Rain</title>
    <style>
        body {
            margin: 0; background: #0f172a; color: #f8fafc;
            font-family: sans-serif; display: flex; flex-direction: column;
            align-items: center; justify-content: center; height: 100vh;
        }
        h1 { font-weight: 300; letter-spacing: 4px; color: #38bdf8; }
        select {
            background: #1e293b; color: white; border: 1px solid #334155;
            padding: 12px; border-radius: 8px; margin-bottom: 20px; width: 280px;
        }
        #playBtn {
            background: #38bdf8; color: #0f172a; border: none;
            padding: 20px 50px; border-radius: 50px; font-size: 1.2rem;
            font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        #playBtn.active { background: #ef4444; color: white; }
        #status { margin-top: 20px; font-size: 0.8rem; color: #64748b; }
    </style>
</head>
<body>

    <h1>ATMOSPHERE</h1>

    <select id="rainSelect">
        <option value="https://actions.google.com/sounds/v1/weather/rain_heavy_loud.ogg">Heavy Rain</option>
        <option value="https://actions.google.com/sounds/v1/weather/rain_on_roof.ogg">Rain on Roof</option>
        <option value="https://actions.google.com/sounds/v1/weather/thunderstorm.ogg">Thunderstorm</option>
    </select>

    <button id="playBtn">START</button>
    <div id="status">Ready</div>

    <script>
        const player = new Audio();
        player.loop = true;

        const playBtn = document.getElementById('playBtn');
        const rainSelect = document.getElementById('rainSelect');
        const statusText = document.getElementById('status');

        playBtn.onclick = async function() {
            // 1. If it's already playing, STOP it
            if (!player.paused) {
                player.pause();
                player.currentTime = 0;
                playBtn.innerText = "START";
                playBtn.classList.remove('active');
                statusText.innerText = "Stopped";
                return;
            }

            // 2. Start Logic
            statusText.innerText = "Connecting...";
            player.src = rainSelect.value;

            try {
                await player.play();
                // We update the UI here immediately after play starts
                updateUI(true);
            } catch (err) {
                console.error("Playback failed, trying backup...");
                // Emergency fallback logic
                player.src = "https://actions.google.com/sounds/v1/weather/rain_heavy_loud.ogg";
                try {
                    await player.play();
                    updateUI(true);
                    statusText.innerText = "Playing Backup Rain";
                } catch (finalErr) {
                    statusText.innerText = "Error: Tap again";
                    updateUI(false);
                }
            }
        };

        function updateUI(isPlaying) {
            if (isPlaying) {
                playBtn.innerText = "STOP";
                playBtn.classList.add('active');
                statusText.innerText = "Playing Smoothly";
            } else {
                playBtn.innerText = "START";
                playBtn.classList.remove('active');
            }
        }

        rainSelect.onchange = () => {
            player.pause();
            updateUI(false);
        };
    </script>
</body>
</html>
