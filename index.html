<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">

<meta name="theme-color" content="#05070a">

<link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/1146/1146860.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atmosphere - Simple</title>
    <style>
        body { margin: 0; height: 100vh; background: #05070a; overflow: hidden; display: flex; align-items: center; justify-content: center; color: white; font-family: sans-serif; }
        .rain { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        .drop { position: absolute; background: rgba(255, 255, 255, 0.4); width: 1px; height: 30px; top: -40px; animation: fall linear infinite; }
        @keyframes fall { to { transform: translateY(100vh); } }
        .content { z-index: 10; text-align: center; background: rgba(10, 15, 25, 0.95); padding: 30px; border-radius: 25px; width: 280px; box-shadow: 0 20px 50px rgba(0,0,0,0.9); border: 1px solid #1e293b; }
        h1 { color: #60a5fa; font-weight: 300; margin-top: 0; }
        label { display: block; text-align: left; margin-top: 15px; font-size: 0.7rem; color: #60a5fa; text-transform: uppercase; letter-spacing: 1px; }
        select, button { width: 100%; padding: 12px; margin-top: 8px; border-radius: 10px; font-size: 1rem; cursor: pointer; border: none; }
        select { background: #0f172a; color: #94a3b8; }
        #playBtn { background: #2563eb; color: white; font-weight: bold; margin-top: 20px; }
        #playBtn.active { background: #dc2626; }
        #status { font-size: 11px; color: #475569; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="rain" id="rainContainer"></div>

    <div class="content">
        <h1>Atmosphere</h1>
        
        <label>Sound</label>
        <select id="rainSelect">
            <option value="https://archive.org/download/RelaxingRainAndLoudThunderFreeFieldRecordingOfNatureSoundsForSleepOrMeditation/medium.ogg">Heavy Rain</option>
            <option value="https://archive.org/download/RelaxingRainAndLoudThunderFreeFieldRecordingOfNatureSoundsForSleepOrMeditation/soft.ogg">Soft Drizzle</option>
        </select>

        <label>Timer</label>
        <select id="timerSelect">
            <option value="0">Continuous</option>
            <option value="5">5 Minutes</option>
            <option value="10">10 Minutes</option>
            <option value="30">30 Minutes</option>
        </select>
        
        <button onclick="handleBtnClick()" id="playBtn">START</button>
        <div id="status">Ready</div>
    </div>

    <audio id="mainAudio" loop></audio>

    <script>
        const audio = document.getElementById('mainAudio');
        const btn = document.getElementById('playBtn');
        const status = document.getElementById('status');
        const selector = document.getElementById('rainSelect');
        const timerSelector = document.getElementById('timerSelect');
        const container = document.getElementById('rainContainer');
        let timerTimeout = null;

        function startVisuals() {
            container.innerHTML = '';
            for (let i = 0; i < 80; i++) {
                const drop = document.createElement('div');
                drop.className = 'drop';
                drop.style.left = Math.random() * 100 + 'vw';
                drop.style.animationDuration = (Math.random() * 0.5 + 0.3) + 's';
                container.appendChild(drop);
            }
        }

        function stopEverything() {
            audio.pause();
            btn.innerText = "START";
            btn.classList.remove('active');
            container.innerHTML = '';
            if (timerTimeout) clearTimeout(timerTimeout);
            status.innerText = "Stopped";
        }

        function handleBtnClick() {
            if (!audio.paused) {
                stopEverything();
            } else {
                status.innerText = "Loading...";
                audio.src = selector.value;
                
                // Directly playing on click is the most reliable way for Android
                audio.play().then(() => {
                    btn.innerText = "STOP";
                    btn.classList.add('active');
                    status.innerText = "Playing...";
                    startVisuals();
                    
                    // Set timer if needed
                    const mins = parseInt(timerSelector.value);
                    if (mins > 0) {
                        timerTimeout = setTimeout(stopEverything, mins * 60000);
                        status.innerText += " (" + mins + "m left)";
                    }
                }).catch(err => {
                    status.innerText = "Tap again to play";
                });
            }
        }
    </script>
</body>
</html>
