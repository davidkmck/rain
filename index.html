<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rain App</title>
    <style>
        body {
            margin: 0; background: #060b16; color: #f8fafc;
            font-family: sans-serif; display: flex; flex-direction: column;
            align-items: center; justify-content: center; height: 100vh;
            overflow: hidden;
        }
        
        /* POURING RAIN ANIMATION */
        #rain-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; display: none; z-index: 1;
        }
        .drop {
            position: absolute; 
            width: 1px;         /* Thinner */
            height: 25px;       /* Longer */
            background: rgba(255, 255, 255, 0.4);
            animation: fall 0.2s linear infinite; /* Much faster for "pouring" effect */
        }
        @keyframes fall { to { transform: translateY(100vh); } }

        /* CHANGED FROM ATMOSPHERE TO RAIN */
        h1 { font-weight: 300; letter-spacing: 12px; color: #38bdf8; z-index: 10; margin-bottom: 40px; }
        
        select {
            background: #1e293b; color: white; border: 1px solid #334155;
            padding: 15px; border-radius: 12px; margin-bottom: 25px; 
            width: 280px; z-index: 10; font-size: 16px; outline: none;
        }
        
        #playBtn {
            background: #38bdf8; color: #0f172a; border: none;
            padding: 22px 60px; border-radius: 50px; font-size: 1.3rem;
            font-weight: bold; cursor: pointer; transition: 0.3s; z-index: 10;
        }
        #playBtn.active { background: #ef4444; color: white; }
        
        #status { margin-top: 25px; font-size: 0.9rem; color: #64748b; z-index: 10; }
    </style>
</head>
<body>

    <div id="rain-container"></div>

    <h1>RAIN</h1>

    <select id="rainSelect">
        <option value="https://actions.google.com/sounds/v1/weather/rain_heavy_loud.ogg">Heavy Rain</option>
        <option value="https://actions.google.com/sounds/v1/weather/rain_on_roof.ogg">Rain on Roof</option>
        <option value="https://actions.google.com/sounds/v1/weather/thunderstorm.ogg">Thunderstorm</option>
    </select>

    <button id="playBtn">START</button>
    <div id="status">Ready</div>

    <script>
        const player = new Audio();
        player.loop = true;

        const btn = document.getElementById('playBtn');
        const selector = document.getElementById('rainSelect');
        const status = document.getElementById('status');
        const rainContainer = document.getElementById('rain-container');

        function createRain() {
            rainContainer.innerHTML = '';
            // Increased to 120 drops for a heavier look
            for(let i=0; i<120; i++) {
                let drop = document.createElement('div');
                drop.className = 'drop';
                drop.style.left = Math.random() * 100 + 'vw';
                drop.style.animationDelay = Math.random() * 1 + 's';
                // Varied speeds for depth
                drop.style.animationDuration = (0.15 + Math.random() * 0.1) + 's'; 
                rainContainer.appendChild(drop);
            }
        }

        function toggle() {
            if (player.paused) {
                // UI Changes
                btn.innerText = "STOP";
                btn.classList.add('active');
                status.innerText = "Pouring...";
                rainContainer.style.display = 'block';
                createRain();
                
                // Audio
                player.src = selector.value;
                player.play().catch(e => {
                    // Fallback for browser block
                    player.play();
                });
            } else {
                player.pause();
                player.currentTime = 0;
                btn.innerText = "START";
                btn.classList.remove('active');
                status.innerText = "Ready";
                rainContainer.style.display = 'none';
            }
        }

        btn.onclick = toggle;
        selector.onchange = () => { if (!player.paused) toggle(); };
    </script>
</body>
</html>
