<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rain App</title>
    <style>
        body {
            margin: 0; background: #0f172a; color: #f8fafc;
            font-family: sans-serif; display: flex; flex-direction: column;
            align-items: center; justify-content: center; height: 100vh;
            overflow: hidden; transition: background 1s;
        }
        
        /* THE RAIN ANIMATION: Pure CSS, no external images needed */
        #rain-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; display: none; z-index: 1;
        }
        .drop {
            position: absolute; width: 2px; height: 15px;
            background: rgba(255, 255, 255, 0.2);
            animation: fall 0.5s linear infinite;
        }
        @keyframes fall { to { transform: translateY(100vh); } }

        h1 { font-weight: 300; letter-spacing: 10px; color: #38bdf8; z-index: 10; margin-bottom: 40px; }
        
        select {
            background: #1e293b; color: white; border: 1px solid #334155;
            padding: 15px; border-radius: 12px; margin-bottom: 25px; 
            width: 280px; z-index: 10; font-size: 16px; outline: none;
        }
        
        #playBtn {
            background: #38bdf8; color: #0f172a; border: none;
            padding: 22px 60px; border-radius: 50px; font-size: 1.3rem;
            font-weight: bold; cursor: pointer; transition: 0.3s; z-index: 10;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        #playBtn.active { background: #ef4444; color: white; }
        
        #status { margin-top: 25px; font-size: 0.9rem; color: #64748b; z-index: 10; font-style: italic; }
    </style>
</head>
<body>

    <div id="rain-container"></div>

    <h1>RAIN</h1>

    <select id="rainSelect">
        <option value="https://actions.google.com/sounds/v1/weather/rain_heavy_loud.ogg">Heavy Rain</option>
        <option value="https://actions.google.com/sounds/v1/weather/rain_on_roof.ogg">Rain on Roof</option>
        <option value="https://actions.google.com/sounds/v1/weather/thunderstorm.ogg">Thunderstorm</option>
    </select>

    <button id="playBtn">START</button>
    <div id="status">Ready</div>

    <script>
        const player = new Audio();
        player.loop = true;

        const btn = document.getElementById('playBtn');
        const selector = document.getElementById('rainSelect');
        const status = document.getElementById('status');
        const rainContainer = document.getElementById('rain-container');

        // Create the CSS rain drops once
        function createRain() {
            rainContainer.innerHTML = '';
            for(let i=0; i<80; i++) {
                let drop = document.createElement('div');
                drop.className = 'drop';
                drop.style.left = Math.random() * 100 + 'vw';
                drop.style.animationDelay = Math.random() * 2 + 's';
                drop.style.animationDuration = (0.2 + Math.random() * 0.3) + 's';
                rainContainer.appendChild(drop);
            }
        }

        function start() {
            // 1. Update UI immediately
            btn.innerText = "STOP";
            btn.classList.add('active');
            status.innerText = "Atmosphere Loading...";
            
            // 2. Start Animation
            rainContainer.style.display = 'block';
            createRain();

            // 3. Start Audio
            player.src = selector.value;
            player.play().catch(e => {
                console.log("Retrying audio...");
                player.play(); // Second attempt often clears browser blocks
            });
        }

        function stop() {
            player.pause();
            player.currentTime = 0;
            btn.innerText = "START";
            btn.classList.remove('active');
            status.innerText = "Ready";
            rainContainer.style.display = 'none';
        }

        btn.onclick = () => {
            if (player.paused) {
                start();
            } else {
                stop();
            }
        };

        selector.onchange = () => { if (!player.paused) stop(); };
    </script>
</body>
</html>
