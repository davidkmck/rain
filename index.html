<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rain App</title>
    <style>
        body {
            margin: 0; background: #060b16; color: #f8fafc;
            font-family: sans-serif; display: flex; flex-direction: column;
            align-items: center; justify-content: center; height: 100vh;
            overflow: hidden;
        }
        
        /* POURING RAIN ANIMATION */
        #rain-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; display: none; z-index: 1;
        }
        .drop {
            position: absolute; 
            width: 1px;
            height: 35px; /* Longer for streaking effect */
            background: rgba(255, 255, 255, 0.3);
            transform: rotate(10deg); /* Slight angle for driving rain */
            animation: fall 0.15s linear infinite; /* High speed */
        }
        @keyframes fall { to { transform: translateY(100vh) rotate(10deg); } }

        h1 { font-weight: 300; letter-spacing: 12px; color: #38bdf8; z-index: 10; margin-bottom: 30px; }
        
        .controls { display: flex; flex-direction: column; gap: 15px; align-items: center; z-index: 10; }

        select {
            background: #1e293b; color: white; border: 1px solid #334155;
            padding: 12px; border-radius: 8px; width: 280px; font-size: 16px; outline: none;
        }
        
        #playBtn {
            background: #38bdf8; color: #0f172a; border: none;
            padding: 20px 60px; border-radius: 50px; font-size: 1.3rem;
            font-weight: bold; cursor: pointer; transition: 0.3s; margin: 10px 0;
        }
        #playBtn.active { background: #ef4444; color: white; }
        
        #status { font-size: 0.9rem; color: #64748b; height: 20px; }
    </style>
</head>
<body>

    <div id="rain-container"></div>

    <h1>RAIN</h1>

    <div class="controls">
        <select id="rainSelect">
            <option value="https://actions.google.com/sounds/v1/weather/rain_heavy_loud.ogg">Heavy Rain</option>
            <option value="https://actions.google.com/sounds/v1/weather/rain_on_roof.ogg">Rain on Roof</option>
            <option value="https://actions.google.com/sounds/v1/weather/thunderstorm.ogg">Thunderstorm</option>
        </select>

        <select id="timerSelect">
            <option value="0">Continuous</option>
            <option value="5">5 Minutes</option>
            <option value="10">10 Minutes</option>
            <option value="30">30 Minutes</option>
        </select>

        <button id="playBtn">START</button>
        <div id="status">Ready</div>
    </div>

    <script>
        const player = new Audio();
        player.loop = true;

        const btn = document.getElementById('playBtn');
        const rainSelect = document.getElementById('rainSelect');
        const timerSelect = document.getElementById('timerSelect');
        const status = document.getElementById('status');
        const rainContainer = document.getElementById('rain-container');
        
        let timerTimeout;

        function createRain() {
            rainContainer.innerHTML = '';
            for(let i=0; i<150; i++) {
                let drop = document.createElement('div');
                drop.className = 'drop';
                drop.style.left = Math.random() * 100 + 'vw';
                drop.style.animationDelay = Math.random() * 1 + 's';
                drop.style.animationDuration = (0.1 + Math.random() * 0.1) + 's'; 
                rainContainer.appendChild(drop);
            }
        }

        function stop() {
            player.pause();
            player.currentTime = 0;
            btn.innerText = "START";
            btn.classList.remove('active');
            status.innerText = "Ready";
            rainContainer.style.display = 'none';
            clearTimeout(timerTimeout);
        }

        function start() {
            // UI Setup
            btn.innerText = "STOP";
            btn.classList.add('active');
            rainContainer.style.display = 'block';
            createRain();

            // Audio Setup
            player.src = rainSelect.value;
            player.play();

            // Timer Logic
            const minutes = parseInt(timerSelect.value);
            if (minutes > 0) {
                status.innerText = `Timer set: ${minutes}m`;
                timerTimeout = setTimeout(() => {
                    stop();
                }, minutes * 60000);
            } else {
                status.innerText = "Playing Continuous";
            }
        }

        btn.onclick = () => {
            if (player.paused) { start(); } 
            else { stop(); }
        };

        // Reset if they change sound while playing
        rainSelect.onchange = () => { if (!player.paused) stop(); };
    </script>
</body>
</html>
