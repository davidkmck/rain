<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atmosphere - Offline Ready</title>
    <style>
        body { margin: 0; height: 100vh; background: #05070a; overflow: hidden; display: flex; align-items: center; justify-content: center; color: white; font-family: sans-serif; }
        .rain { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        .drop { position: absolute; background: rgba(255, 255, 255, 0.4); width: 1px; height: 30px; top: -40px; animation: fall linear infinite; }
        @keyframes fall { to { transform: translateY(100vh); } }
        .content { z-index: 10; text-align: center; background: rgba(10, 15, 25, 0.95); padding: 30px; border-radius: 25px; border: 1px solid #1e293b; width: 320px; box-shadow: 0 20px 50px rgba(0,0,0,0.9); }
        h1 { color: #60a5fa; font-weight: 300; margin: 0 0 20px 0; }
        label { display: block; text-align: left; margin-top: 15px; font-size: 0.75rem; color: #60a5fa; text-transform: uppercase; letter-spacing: 1.5px; }
        select, button { width: 100%; padding: 12px; margin-top: 8px; border-radius: 10px; font-size: 0.95rem; cursor: pointer; border: none; outline: none; }
        select { background: #0f172a; color: #94a3b8; border: 1px solid #334155; }
        #playBtn { background: #2563eb; color: white; font-weight: bold; margin-top: 25px; height: 55px; }
        #playBtn.active { background: #dc2626; }
        #status { font-size: 11px; color: #475569; margin-top: 20px; font-style: italic; }
    </style>
</head>
<body>

    <div class="rain" id="rainContainer"></div>

    <div class="content">
        <h1>Atmosphere</h1>
        
        <label>Sound Type</label>
        <select id="rainSelect" onchange="handleSourceChange()">
            <option value="heavy">Heavy Rain (Embedded)</option>
            <option value="soft">Soft Drizzle (Embedded)</option>
        </select>

        <label>Sleep Timer</label>
        <select id="timerSelect">
            <option value="0">Continuous</option>
            <option value="5">5 Minutes</option>
            <option value="10">10 Minutes</option>
            <option value="30">30 Minutes</option>
        </select>
        
        <button onclick="toggleAudio()" id="playBtn">START</button>
        <div id="status">Offline Version Loaded</div>
    </div>

    <audio id="mainAudio" loop></audio>

    <script>
const selector = document.getElementById('rainSelect');
const btn = document.getElementById('playBtn');
const status = document.getElementById('status');

// Create one single player
let player = new Audio();

// This is the secret sauce for gapless:
player.addEventListener('timeupdate', function() {
    // When the sound is 0.1 seconds from the end, jump to the start
    const buffer = 0.1;
    if (this.currentTime > this.duration - buffer) {
        this.currentTime = 0;
        this.play();
    }
});

async function handleBtnClick() {
    if (!player.paused) {
        // STOP LOGIC
        player.pause();
        player.currentTime = 0;
        btn.innerText = "START";
        btn.classList.remove('active');
        status.innerText = "Stopped";
        if (typeof stopVisuals === "function") stopVisuals();
    } else {
        // START LOGIC
        status.innerText = "Connecting...";
        
        // Force the source update inside the click event (Crucial for Android)
        player.src = selector.value;
        player.load(); 
        
        try {
            await player.play();
            btn.innerText = "STOP";
            btn.classList.add('active');
            status.innerText = "Playing (Seamless)";
            if (typeof startVisuals === "function") startVisuals();
        } catch (e) {
            status.innerText = "Error: Tap again";
            console.error("Audio error:", e);
        }
    }
}
        
    </script>
</body>
</html>
